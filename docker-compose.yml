# =====================================================================================
# Local development stack — Postgres 16 + Redis 7 + Azurite (Blob emulator) +
# Service Bus Emulator. Matches the proposal's Testcontainers integration-test stack
# (proposal §18.3). Brings every dependency up with one `docker compose up -d`.
# =====================================================================================
name: vrbook-dev

services:

  # ----- Postgres 16 ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: vrbook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vrbook
      POSTGRES_PASSWORD: vrbook
      POSTGRES_DB: vrbook
      # Required for the proposal's earthdistance + ll_to_earth radius search
      # (proposal §5.2). We install the extensions in 01-init.sql below.
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrbook -d vrbook"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----- Redis (booking holds, distributed lock, cache) -----------------------------
  redis:
    image: redis:7-alpine
    container_name: vrbook-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ----- Azurite (Blob Storage emulator for property images + attachments) ----------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: vrbook-azurite
    restart: unless-stopped
    command: ["azurite", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0", "--tableHost", "0.0.0.0", "-l", "/data"]
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite-data:/data

  # ----- Service Bus Emulator (Microsoft) -------------------------------------------
  # Requires SQL Edge as a sidecar. The emulator config lives in docker/servicebus-config.json.
  # See https://github.com/Azure/azure-service-bus-emulator-installer
  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: vrbook-sqledge
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: "VrBookLocal_1234"
    networks: [vrbook-internal]

  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: vrbook-servicebus
    restart: unless-stopped
    depends_on:
      - sqledge
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "VrBookLocal_1234"
      CONFIG_PATH: "/ServiceBus_Emulator/ConfigFiles/Config.json"
    ports:
      - "5672:5672"
    volumes:
      - ./docker/servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    networks: [vrbook-internal, default]

  # ----- Stripe CLI (optional — start with `docker compose --profile stripe up`) ----
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: vrbook-stripe-cli
    profiles: [stripe]
    command: ["listen", "--forward-to", "http://host.docker.internal:8080/api/v1/payments/webhooks/stripe"]
    environment:
      STRIPE_API_KEY: "${STRIPE_API_KEY:-sk_test_replace_me}"
      STRIPE_DEVICE_NAME: "vrbook-local"

  # ----- Mailpit (catches local SendGrid SMTP fallback if you wire one) -------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: vrbook-mailpit
    profiles: [mail]
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres-data:
  redis-data:
  azurite-data:

networks:
  vrbook-internal:
