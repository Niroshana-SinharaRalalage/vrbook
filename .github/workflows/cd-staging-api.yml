# =============================================================================
# cd-staging-api.yml
#   Single-file pipeline for the backend lane: tests -> contracts -> 5 image
#   builds -> Bicep deploy -> Postgres migrate -> deploy workers + API.
#   Triggered by push to develop on backend / infra paths. No PRs for now.
# =============================================================================
name: cd-staging-api

on:
  push:
    branches: [develop]
    paths:
      - "src/**"
      - "tests/**"
      - "contracts/**"
      - "infra/**"
      - "**/*.csproj"
      - "**/Directory.Build.props"
      - "**/Directory.Build.targets"
      - "**/Directory.Packages.props"
      - "**/global.json"
      - "**/VrBook.sln"
      - ".github/workflows/cd-staging-api.yml"
      - ".github/workflows/_deploy-container-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read
  packages: write

concurrency:
  group: cd-staging-api
  cancel-in-progress: false

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  SOLUTION: src/VrBook.sln
  OPENAPI_SPEC: contracts/openapi.yaml
  RESOURCE_GROUP: rg-vrbook-staging

jobs:
  # ---- Backend: restore, lint, build, unit + integration tests -----------
  backend:
    name: backend (.NET 8)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vrbook
          POSTGRES_PASSWORD: vrbook
          POSTGRES_DB: vrbook
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vrbook"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=vrbook;Username=vrbook;Password=vrbook"
      ConnectionStrings__Redis: "localhost:6379"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Lint (dotnet format)
        run: dotnet format ${{ env.SOLUTION }} --verify-no-changes --no-restore

      - name: Build (Release)
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release

      - name: Unit tests
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --no-build \
            --configuration Release \
            --filter "Category!=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=unit.trx"

      - name: Integration tests
        continue-on-error: true
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --no-build \
            --configuration Release \
            --filter "Category=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=integration.trx"

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./TestResults
          retention-days: 7
          if-no-files-found: ignore

  # ---- Contracts: OpenAPI breaking-change check + Spectral lint ----------
  contracts:
    name: contracts (OpenAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install oasdiff
        run: |
          OASDIFF_VERSION="1.10.25"
          curl -fsSL "https://github.com/Tufin/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oasdiff
          oasdiff --version

      - name: Fetch main copy of OpenAPI spec
        id: base_spec
        run: |
          mkdir -p .ci-tmp
          if git cat-file -e "origin/main:${OPENAPI_SPEC}" 2>/dev/null; then
            git show "origin/main:${OPENAPI_SPEC}" > .ci-tmp/openapi.main.yaml
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: OpenAPI breaking-change check
        if: steps.base_spec.outputs.exists == 'true' && hashFiles(env.OPENAPI_SPEC) != ''
        run: |
          oasdiff breaking \
            --fail-on ERR \
            --format githubactions \
            .ci-tmp/openapi.main.yaml ${{ env.OPENAPI_SPEC }}

      - name: OpenAPI changelog (informational)
        if: steps.base_spec.outputs.exists == 'true' && hashFiles(env.OPENAPI_SPEC) != ''
        continue-on-error: true
        run: |
          oasdiff changelog \
            --format githubactions \
            .ci-tmp/openapi.main.yaml ${{ env.OPENAPI_SPEC }}

      - name: Spectral lint OpenAPI
        if: hashFiles(env.OPENAPI_SPEC) != ''
        run: |
          npm install -g @stoplight/spectral-cli@6.13.1
          spectral lint --fail-severity=error ${{ env.OPENAPI_SPEC }}

  # ---- Images: build, scan, push the 5 .NET images to ACR ---------------
  images:
    name: build & scan images
    needs: [backend, contracts]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: src/VrBook.Api/Dockerfile
            context: .
          - name: migrator
            dockerfile: src/VrBook.Migrator/Dockerfile
            context: .
          - name: sync-worker
            dockerfile: src/Workers/VrBook.Workers.Sync/Dockerfile
            context: .
          - name: notification-worker
            dockerfile: src/Workers/VrBook.Workers.Notifications/Dockerfile
            context: .
          - name: booking-worker
            dockerfile: src/Workers/VrBook.Workers.Booking/Dockerfile
            context: .
    env:
      IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-${{ matrix.name }}:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ env.IMAGE }}
          push: false
          load: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Generate SBOM (Syft)
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.name }}.spdx.json
          output-file: sbom-${{ matrix.name }}.spdx.json
          upload-artifact: false

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Upload SBOM artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json
          retention-days: 30

      - name: Push image to ACR
        run: docker push ${{ env.IMAGE }}

  # ---- Infra: Bicep what-if + deploy -------------------------------------
  infra:
    name: infra (Bicep)
    needs: [backend, contracts]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep what-if
        run: |
          az deployment group what-if \
            -g ${{ env.RESOURCE_GROUP }} \
            -f infra/main.bicep \
            -p infra/environments/staging.bicepparam

      - name: Bicep deploy
        run: |
          az deployment group create \
            -g ${{ env.RESOURCE_GROUP }} \
            -f infra/main.bicep \
            -p infra/environments/staging.bicepparam \
            --query "{provisioningState:properties.provisioningState, outputs:properties.outputs}" \
            -o json

  # ---- Migrate: run EF migrations against staging Postgres ---------------
  migrate:
    name: migrate (Postgres)
    needs: [infra, images]
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update migrator job image
        run: |
          az containerapp job update \
            -n caj-vrbook-migrator-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/vrbook-migrator:${{ github.sha }}

      - name: Start migrator job + wait
        run: |
          set -euo pipefail
          EXEC=$(az containerapp job start \
            -n caj-vrbook-migrator-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --query name -o tsv)
          echo "Started execution: $EXEC"
          for i in $(seq 1 30); do
            STATE=$(az containerapp job execution show \
              -n caj-vrbook-migrator-staging \
              -g ${{ env.RESOURCE_GROUP }} \
              --job-execution-name "$EXEC" \
              --query properties.status -o tsv)
            echo "[$i/30] migrator state: $STATE"
            case "$STATE" in
              Succeeded) exit 0 ;;
              Failed|Degraded) echo "::error::migrator failed"; exit 1 ;;
            esac
            sleep 10
          done
          echo "::error::migrator did not finish in 5 minutes"
          exit 1

  # ---- Deploy: 3 workers in parallel, then API ---------------------------
  deploy-sync-worker:
    name: deploy sync-worker (job)
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Update sync-worker job image
        run: |
          az containerapp job update \
            -n caj-vrbook-sync-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/vrbook-sync-worker:${{ github.sha }}

  deploy-notification-worker:
    name: deploy notification-worker
    needs: migrate
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: ca-vrbook-notifworker-staging
      resource_group: rg-vrbook-staging
      image: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-notification-worker:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-booking-worker:
    name: deploy booking-worker
    needs: migrate
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: ca-vrbook-bookingworker-staging
      resource_group: rg-vrbook-staging
      image: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-booking-worker:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-api:
    name: deploy api
    needs: [deploy-sync-worker, deploy-notification-worker, deploy-booking-worker]
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: ca-vrbook-api-staging
      resource_group: rg-vrbook-staging
      image: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-api:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---- Smoke: post-deploy curl sweep of the live API ---------------------
  # Hits the actually-rolled FQDN with DevAuth (staging has
  # DevAuth__AllowAnonymous=true), checks that every implemented endpoint
  # responds with the expected status code. Fails the run if any check fails
  # so the team sees red instead of a silently-broken staging.
  smoke:
    name: smoke (api)
    needs: deploy-api
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover API FQDN
        id: fqdn
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show \
            -n ca-vrbook-api-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
          echo "API FQDN: https://$FQDN"

      - name: Wait for active revision to match deployed image (max 3 min)
        env:
          EXPECTED_IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-api:${{ github.sha }}
        run: |
          set -euo pipefail
          # Don't trust /health/live alone — the OLD revision can serve 200
          # while traffic is still shifting. Poll the platform until the active
          # revision is running the image we just pushed.
          for i in $(seq 1 36); do
            ACTIVE=$(az containerapp revision list \
              -n ca-vrbook-api-staging \
              -g ${{ env.RESOURCE_GROUP }} \
              --query "[?properties.active].{name:name, image:properties.template.containers[0].image, state:properties.runningState, health:properties.healthState}" \
              -o json)
            echo "[$i/36] active revisions: $ACTIVE"
            MATCH=$(echo "$ACTIVE" | jq -r --arg img "$EXPECTED_IMAGE" '.[] | select(.image==$img and .state=="Running" and .health=="Healthy") | .name' | head -1)
            if [ -n "$MATCH" ]; then
              echo "Active revision $MATCH is serving the expected image"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Active revision did not converge on $EXPECTED_IMAGE within 3 min"
          exit 1

      - name: Smoke endpoints
        env:
          API: https://${{ steps.fqdn.outputs.fqdn }}
        run: |
          set -euo pipefail

          assert() {
            local name=$1 expected=$2 actual=$3
            if [ "$actual" != "$expected" ]; then
              echo "::error::$name expected HTTP $expected, got $actual"
              exit 1
            fi
            echo "  $name -> $actual  OK"
          }

          curl_status() { curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$@"; }

          echo "=== Health ==="
          assert "/health/live"  200 "$(curl_status "$API/health/live")"
          # /health/ready is currently Degraded (Redis disabled in staging);
          # it still returns 200 so we accept that. Tighten when Redis lands.
          assert "/health/ready" 200 "$(curl_status "$API/health/ready")"

          echo "=== Identity (DevAuth path) ==="
          # DevAuth__AllowAnonymous=true on staging - GET /me must succeed with no header.
          assert "GET  /api/v1/me"            200 "$(curl_status "$API/api/v1/me")"
          assert "GET  /api/v1/admin/users"   200 "$(curl_status "$API/api/v1/admin/users")"

          # Verify the body of /me actually has an id - guards against the
          # API returning a stub or empty object even if the status is 200.
          BODY=$(curl -sS --max-time 15 "$API/api/v1/me")
          echo "  /me body: $BODY"
          echo "$BODY" | jq -e '.id and (.email | length > 0)' > /dev/null \
            || { echo "::error::/api/v1/me did not return a valid user object"; exit 1; }
          echo "  /me body shape  OK"

          echo "=== Swagger (enabled via Swagger__EnableInProduction) ==="
          assert "GET  /swagger/v1/swagger.json" 200 "$(curl_status "$API/swagger/v1/swagger.json")"

          echo "=== Catalog (A2) ==="
          assert "GET  /api/v1/properties"        200 "$(curl_status "$API/api/v1/properties")"
          assert "GET  /api/v1/properties?limit=5" 200 "$(curl_status "$API/api/v1/properties?limit=5")"
          assert "GET  /api/v1/amenities"         200 "$(curl_status "$API/api/v1/amenities")"

          # Amenity seed should have produced 25 rows on first deploy. Drop
          # this assertion as new seeds land - codes are stable but count
          # will grow.
          AMEN_COUNT=$(curl -sS --max-time 15 "$API/api/v1/amenities" | jq 'length')
          echo "  amenity count: $AMEN_COUNT"
          if [ "${AMEN_COUNT:-0}" -lt 25 ]; then
            echo "::error::expected >= 25 seeded amenities, got $AMEN_COUNT"
            exit 1
          fi
          echo "  amenity seed count OK"

          # NOTE(A3+): when Pricing / Booking endpoints ship, add their
          # smoke calls here so every new agent's path is covered.

          echo ""
          echo "Smoke OK on $API"
