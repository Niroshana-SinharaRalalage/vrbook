# =============================================================================
# cd-staging-api.yml — Deploy the API + workers + migrator to STAGING.
# Triggered by push to develop on backend / infra paths. Gates on ci-backend.
# Frontend has its own cd-staging-web.yml — they run independently.
# =============================================================================
name: cd-staging-api

on:
  push:
    branches: [develop]
    paths:
      - "src/**"
      - "tests/**"
      - "contracts/**"
      - "infra/**"
      - "**/*.csproj"
      - "**/Directory.Build.props"
      - "**/Directory.Build.targets"
      - "**/Directory.Packages.props"
      - "**/global.json"
      - "**/VrBook.sln"
      - ".github/workflows/cd-staging-api.yml"
      - ".github/workflows/_deploy-container-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: cd-staging-api
  cancel-in-progress: false

env:
  RESOURCE_GROUP: rg-vrbook-staging

jobs:
  # ---- Gate: require ci-backend to be green for this SHA -----------------
  gate:
    name: gate (verify ci-backend green)
    runs-on: ubuntu-latest
    steps:
      - name: Wait for ci-backend to complete + verify success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # ci-backend fires on the same push and runs in parallel with us.
          # Poll up to 25 minutes for it to complete; abort if it failed.
          # If ci-backend was SKIPPED by path filters (e.g. infra-only push),
          # accept that as a pass — the API still needs redeploying.
          for i in $(seq 1 75); do
            RAW=$(gh api \
              "repos/${{ github.repository }}/actions/runs?branch=develop&head_sha=${{ github.sha }}&per_page=20" \
              --jq '.workflow_runs[] | select(.name=="ci-backend") | {status, conclusion}' | head -2)
            STATUS=$(echo "$RAW" | jq -r '.status // "missing"' | head -1)
            CONCLUSION=$(echo "$RAW" | jq -r '.conclusion // ""' | head -1)
            echo "[$i/75] ci-backend status=$STATUS conclusion=${CONCLUSION:-<none>}"
            # 'missing' = path filters skipped ci-backend (no backend file changed).
            # Allow after ~30s so we don't race a still-registering workflow run.
            if [ "$STATUS" = "missing" ] && [ "$i" -ge 3 ]; then
              echo "ci-backend did not run for this SHA (path filters skipped it); proceeding."
              exit 0
            fi
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ] || [ "$CONCLUSION" = "skipped" ]; then
                echo "ci-backend succeeded; proceeding."
                exit 0
              fi
              echo "::error::ci-backend completed with conclusion='$CONCLUSION' — aborting deploy."
              exit 1
            fi
            sleep 20
          done
          echo "::error::ci-backend did not complete within 25 minutes"
          exit 1

  # ---- Infra: Bicep what-if + deploy --------------------------------------
  infra:
    name: infra (Bicep)
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep what-if
        run: |
          az deployment group what-if \
            -g ${{ env.RESOURCE_GROUP }} \
            -f infra/main.bicep \
            -p infra/environments/staging.bicepparam

      - name: Bicep deploy
        run: |
          az deployment group create \
            -g ${{ env.RESOURCE_GROUP }} \
            -f infra/main.bicep \
            -p infra/environments/staging.bicepparam \
            --query "{provisioningState:properties.provisioningState, outputs:properties.outputs}" \
            -o json

  # ---- Migrate: run EF migrations against staging Postgres ----------------
  migrate:
    name: migrate (Postgres)
    needs: infra
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update migrator job image
        run: |
          az containerapp job update \
            -n caj-vrbook-migrator-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/vrbook-migrator:${{ github.sha }}

      - name: Start migrator job + wait
        run: |
          set -euo pipefail
          EXEC=$(az containerapp job start \
            -n caj-vrbook-migrator-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --query name -o tsv)
          echo "Started execution: $EXEC"
          for i in $(seq 1 30); do
            STATE=$(az containerapp job execution show \
              -n caj-vrbook-migrator-staging \
              -g ${{ env.RESOURCE_GROUP }} \
              --job-execution-name "$EXEC" \
              --query properties.status -o tsv)
            echo "[$i/30] migrator state: $STATE"
            case "$STATE" in
              Succeeded) exit 0 ;;
              Failed|Degraded) echo "::error::migrator failed"; exit 1 ;;
            esac
            sleep 10
          done
          echo "::error::migrator did not finish in 5 minutes"
          exit 1

  # ---- Deploy workers + api ----------------------------------------------
  deploy-sync-worker:
    name: deploy sync-worker (job)
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Update sync-worker job image
        run: |
          az containerapp job update \
            -n caj-vrbook-sync-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/vrbook-sync-worker:${{ github.sha }}

  deploy-notification-worker:
    name: deploy notification-worker
    needs: migrate
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: ca-vrbook-notifworker-staging
      resource_group: rg-vrbook-staging
      image: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-notification-worker:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-booking-worker:
    name: deploy booking-worker
    needs: migrate
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: ca-vrbook-bookingworker-staging
      resource_group: rg-vrbook-staging
      image: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-booking-worker:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-api:
    name: deploy api
    needs: [deploy-sync-worker, deploy-notification-worker, deploy-booking-worker]
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: ca-vrbook-api-staging
      resource_group: rg-vrbook-staging
      image: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-api:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
