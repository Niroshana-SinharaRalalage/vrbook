# =============================================================================
# ci-frontend.yml — CI for the Next.js web app + its container image.
# Path-filtered so backend-only changes don't trigger this workflow.
# =============================================================================
name: ci-frontend

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/ci-frontend.yml"
  push:
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/ci-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.ref }}-ci-frontend
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # frontend — Next.js 14 / Node 20. Lint, typecheck, vitest, next build.
  # ---------------------------------------------------------------------------
  frontend:
    name: frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install (npm ci against committed lock)
        run: npm ci --no-audit --no-fund

      - name: Lint + typecheck
        run: |
          npm run lint
          npm run typecheck

      - name: Test (Vitest)
        # F1 ships no unit tests yet; component tests land per-feature with
        # A2+. --passWithNoTests keeps the job green until the first .test.ts.
        run: npm test -- --run --passWithNoTests

      - name: Build
        run: npm run build

      - name: Upload build artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/.next
          retention-days: 3
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # image — build, scan, push the web image to ACR. Push only on main/develop.
  # ---------------------------------------------------------------------------
  image:
    name: build & scan web image
    needs: frontend
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-web:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          tags: ${{ env.IMAGE }}
          push: false
          load: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Generate SBOM (Syft)
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          artifact-name: sbom-web.spdx.json
          output-file: sbom-web.spdx.json
          upload-artifact: false

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-web.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

      - name: Upload SBOM artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: sbom-web
          path: sbom-web.spdx.json
          retention-days: 30

      - name: Push image to ACR
        run: docker push ${{ env.IMAGE }}
