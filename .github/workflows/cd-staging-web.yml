# =============================================================================
# cd-staging-web.yml
#   Single-file pipeline for the frontend lane: lint -> typecheck -> tests ->
#   build -> image build/scan/push -> deploy web Container App.
#   Triggered by push to develop on web/** paths. No PRs for now.
# =============================================================================
name: cd-staging-web

on:
  push:
    branches: [develop]
    # paths + paths-ignore are mutually exclusive in GH Actions - use
    # negative patterns ("!") inside paths instead.
    paths:
      - "web/**"
      - ".github/workflows/cd-staging-web.yml"
      - ".github/workflows/_deploy-container-app.yml"
      - "!web/**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read
  packages: write

concurrency:
  group: cd-staging-web
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RESOURCE_GROUP: rg-vrbook-staging

jobs:
  # ---- Frontend: lint, typecheck, vitest, next build ---------------------
  frontend:
    name: frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install (npm ci against committed lock)
        run: npm ci --no-audit --no-fund

      - name: Lint + typecheck
        run: |
          npm run lint
          npm run typecheck

      # Slice OPS.2.7 — E2E suite invariant guard (blocking): asserts the
      # scenario count (drift) + that .auth/ stays gitignored.
      - name: E2E suite invariants
        run: npm run check:e2e-suite

      - name: Test (Vitest)
        run: npm test -- --run --passWithNoTests

      # Slice OPS.1.2 — pact consumer + drift gate. Regenerates
      # ../contracts/pacts/vrbook-web-vrbook-api.json; `git diff
      # --exit-code` fails if a dev changed a call shape but forgot
      # to re-commit the file. See docs/runbooks/pact-contract-drift.md
      # (lands OPS.1.7) for triage.
      - name: Pact consumer + drift gate
        run: |
          npm run test:pact
          cd ..
          if ! git diff --exit-code contracts/pacts/; then
            echo "::error::Pact drift — the SPA consumer expectations changed but contracts/pacts/vrbook-web-vrbook-api.json was not committed. Run 'cd web && npm run test:pact' locally, then 'git add contracts/pacts/' and re-push."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Upload build artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/.next
          retention-days: 3
          if-no-files-found: ignore

  # ---- Image: build, scan, push the web image to ACR --------------------
  image:
    name: build & scan web image
    needs: frontend
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-web:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      # OPS.M.0 C1 — fetch the Entra build args from Key Vault. NEXT_PUBLIC_*
      # values are inlined into the BROWSER bundle at `next build`, so they
      # have to reach the docker build context as `--build-arg`, not just the
      # Container App runtime env.
      - name: Fetch Entra build args from Key Vault
        id: entra
        run: |
          # Slice OPS.M.12.6/M.21.FIX — per-flow authorities. Legacy
          # `entra-web-authority` was dropped in M.12.8; msalConfig reads
          # ADMIN/GUEST directly.
          AUTHORITY_ADMIN=$(az keyvault secret show --vault-name kv-vrbook-staging --name entra-web-authority-admin --query value -o tsv)
          AUTHORITY_GUEST=$(az keyvault secret show --vault-name kv-vrbook-staging --name entra-web-authority-guest --query value -o tsv)
          CLIENT_ID=$(az keyvault secret show --vault-name kv-vrbook-staging --name entra-web-client-id --query value -o tsv)
          # VRB-311 — App Insights connection string for the browser bundle.
          # Tolerant: if the secret is absent/placeholder the build-arg is empty
          # and analytics is a no-op (the web ships safe-disabled). Written to KV
          # per-env by main.bicep, so a staging property can't leak into prod.
          APPINSIGHTS_CS=$(az keyvault secret show --vault-name kv-vrbook-staging --name appinsights-connection-string --query value -o tsv 2>/dev/null || echo "")
          if [ "$APPINSIGHTS_CS" = "pending-identity-setup" ]; then APPINSIGHTS_CS=""; fi
          echo "::add-mask::${AUTHORITY_ADMIN}"
          echo "::add-mask::${AUTHORITY_GUEST}"
          echo "::add-mask::${CLIENT_ID}"
          echo "::add-mask::${APPINSIGHTS_CS}"
          echo "authority_admin=${AUTHORITY_ADMIN}" >> "$GITHUB_OUTPUT"
          echo "authority_guest=${AUTHORITY_GUEST}" >> "$GITHUB_OUTPUT"
          echo "client_id=${CLIENT_ID}" >> "$GITHUB_OUTPUT"
          echo "appinsights_cs=${APPINSIGHTS_CS}" >> "$GITHUB_OUTPUT"

      # VRB-205 item 3 (closes G8) — resolve the API base URL from the LIVE
      # Container App instead of a baked FQDN, so it survives any CAE rebuild.
      # Bare origin (no /api/v1) — the web client appends the versioned path.
      - name: Resolve API base URL from the live Container App
        id: api
        run: |
          API_FQDN=$(az containerapp show -n ca-vrbook-api-staging -g rg-vrbook-staging --query "properties.configuration.ingress.fqdn" -o tsv)
          if [ -z "$API_FQDN" ]; then echo "::error::could not resolve ca-vrbook-api-staging FQDN"; exit 1; fi
          echo "base_url=https://${API_FQDN}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          tags: ${{ env.IMAGE }}
          push: false
          load: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.api.outputs.base_url }}
            NEXT_PUBLIC_ENTRA_AUTHORITY_ADMIN=${{ steps.entra.outputs.authority_admin }}
            NEXT_PUBLIC_ENTRA_AUTHORITY_GUEST=${{ steps.entra.outputs.authority_guest }}
            NEXT_PUBLIC_ENTRA_CLIENT_ID=${{ steps.entra.outputs.client_id }}
            NEXT_PUBLIC_APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.entra.outputs.appinsights_cs }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      # Slice OPS.5 — image vulnerability scan (INFORMATIONAL); see
      # cd-staging-api.yml for rationale. Pre-launch go-live gate: review SARIF,
      # no un-triaged HIGH/CRITICAL-fixable. Suppressions in .trivyignore.
      - name: Trivy image scan (informational)
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-web.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: trivy-web
          path: trivy-web.sarif
          retention-days: 14
          if-no-files-found: ignore

      - name: Push image to ACR
        run: docker push ${{ env.IMAGE }}

  # ---- Deploy: roll the web container ------------------------------------
  deploy-web:
    name: deploy web
    needs: image
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: ca-vrbook-web-staging
      resource_group: rg-vrbook-staging
      image: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-web:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---- Smoke: post-deploy curl sweep of the live web app ----------------
  smoke:
    name: smoke (web)
    needs: deploy-web
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover web FQDN
        id: fqdn
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show \
            -n ca-vrbook-web-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
          echo "Web FQDN: https://$FQDN"

      # OPS.INFRA.3 — scale-to-zero-aware convergence. Staging runs
      # minReplicas=0 (OPS.INFRA.2), so a freshly-deployed revision sits
      # ScaledToZero with NO replica to report health=Healthy until traffic
      # arrives — the old "Running && Healthy" gate could never converge and
      # timed out every deploy. Instead: (1) confirm the ACTIVE revision serves
      # the image we just pushed and isn't Failed, then (2) drive traffic to
      # spin it up 0->1 and treat a 200 as the readiness signal.
      - name: Converge + warm the new revision (scale-to-zero aware)
        env:
          EXPECTED_IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-web:${{ github.sha }}
          WARM_URL: https://${{ steps.fqdn.outputs.fqdn }}/
        run: |
          set -uo pipefail
          echo "== Step 1: active revision serves the expected image (max 5 min) =="
          matched=""
          for i in $(seq 1 60); do
            ACTIVE=$(az containerapp revision list -n ca-vrbook-web-staging -g ${{ env.RESOURCE_GROUP }} \
              --query "[?properties.active].{name:name, image:properties.template.containers[0].image, state:properties.runningState}" -o json)
            echo "[$i/60] $ACTIVE"
            NAME=$(echo "$ACTIVE" | jq -r --arg img "$EXPECTED_IMAGE" '.[] | select(.image==$img and .state!="Failed") | .name' | head -1)
            if [ -n "$NAME" ]; then matched="$NAME"; echo "active revision $NAME serves $EXPECTED_IMAGE"; break; fi
            sleep 5
          done
          if [ -z "$matched" ]; then echo "::error::active revision never converged on $EXPECTED_IMAGE within 5 min"; exit 1; fi

          echo "== Step 2: warm 0->1 and confirm a 200 (max 3 min) =="
          for i in $(seq 1 45); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$WARM_URL" || echo 000)
            if [ "$code" = "200" ]; then echo "warm: $WARM_URL ($code)"; exit 0; fi
            echo "[$i/45] $WARM_URL -> $code, warming…"; sleep 4
          done
          echo "::error::revision converged but never served 200 after warm-up"; exit 1

      - name: Smoke routes
        env:
          WEB: https://${{ steps.fqdn.outputs.fqdn }}
        run: |
          set -euo pipefail

          assert() {
            local name=$1 expected=$2 actual=$3
            if [ "$actual" != "$expected" ]; then
              echo "::error::$name expected HTTP $expected, got $actual"
              exit 1
            fi
            echo "  $name -> $actual  OK"
          }

          curl_status() { curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$@"; }

          assert "GET /api/health"     200 "$(curl_status "$WEB/api/health")"
          assert "GET /"               200 "$(curl_status "$WEB/")"
          assert "GET /properties"     200 "$(curl_status "$WEB/properties")"
          assert "GET /account/bookings" 200 "$(curl_status "$WEB/account/bookings")"

          BODY=$(curl -sS --max-time 15 "$WEB/api/health")
          echo "  /api/health body: $BODY"
          echo "$BODY" | jq -e '.status == "ok"' > /dev/null \
            || { echo "::error::/api/health did not report ok"; exit 1; }
          echo "  /api/health shape  OK"

          echo ""
          echo "Smoke OK on $WEB"

  # ---- Playwright anonymous smoke: browser-level flow correctness ---------
  # Slice OPS.2.3 — 5 anonymous *.smoke.spec.ts run against deployed staging.
  # BLOCKING from day one (plan §5-Q4-a). Chromium only. The curl `smoke` job
  # above proves reachability; this proves the React trees actually render +
  # the anonymous quote funnel calculates. Runs AFTER `smoke` so the web
  # container is already warm-ish, but a warm-and-wait step re-primes both the
  # web (Next.js SSR) and API replicas because staging scales to zero
  # independently (OPS.INFRA.2).
  playwright-smoke:
    name: playwright-smoke (anonymous)
    needs: smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install (npm ci against committed lock)
        run: npm ci --no-audit --no-fund

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover web + API FQDNs
        id: fqdn
        run: |
          set -euo pipefail
          WEB=$(az containerapp show -n ca-vrbook-web-staging -g ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          API=$(az containerapp show -n ca-vrbook-api-staging -g ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "web=$WEB" >> "$GITHUB_OUTPUT"
          echo "api=$API" >> "$GITHUB_OUTPUT"
          echo "Web: https://$WEB   API: https://$API"

      - name: Warm up + wait for seed fixture
        env:
          WEB: https://${{ steps.fqdn.outputs.web }}
          API: https://${{ steps.fqdn.outputs.api }}
        run: |
          set -uo pipefail
          # $2 = max attempts (× 2s). Both web + API scale to zero
          # independently (OPS.INFRA.2); the seed property is written by the
          # MIGRATOR in the separate cd-staging-api workflow, so on a push that
          # touches both lanes this may still be seeding when we arrive — hence
          # the generous attempt budget on the property gate.
          warm() {
            local url=$1 max=${2:-30}
            for i in $(seq 1 "$max"); do
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo 000)
              if [ "$code" = "200" ]; then echo "  ready: $url ($code)"; return 0; fi
              echo "  [$i/$max] $url -> $code, waiting…"; sleep 2
            done
            echo "::error::$url never returned 200 within $((max*2))s"; return 1
          }
          warm "$WEB/" 30
          warm "$API/health/ready" 30
          # Gate the detail/quote specs on the deterministic seed property
          # (SeedE2EBackfill). Anonymous GET returns 200 only once the migrator
          # has committed it. ~5 min budget covers the cross-workflow lag.
          warm "$API/api/v1/properties/e2e-smoke-property" 150

      - name: Run anonymous smoke (Chromium, blocking)
        env:
          PLAYWRIGHT_BASE_URL: https://${{ steps.fqdn.outputs.web }}
        run: npx playwright test --project=smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: web/playwright-report
          retention-days: 7
          if-no-files-found: ignore
