# =============================================================================
# cd-staging-web.yml
#   Single-file pipeline for the frontend lane: lint -> typecheck -> tests ->
#   build -> image build/scan/push -> deploy web Container App.
#   Triggered by push to develop on web/** paths. No PRs for now.
# =============================================================================
name: cd-staging-web

on:
  push:
    branches: [develop]
    paths:
      - "web/**"
      - ".github/workflows/cd-staging-web.yml"
      - ".github/workflows/_deploy-container-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read
  packages: write

concurrency:
  group: cd-staging-web
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RESOURCE_GROUP: rg-vrbook-staging

jobs:
  # ---- Frontend: lint, typecheck, vitest, next build ---------------------
  frontend:
    name: frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install (npm ci against committed lock)
        run: npm ci --no-audit --no-fund

      - name: Lint + typecheck
        run: |
          npm run lint
          npm run typecheck

      - name: Test (Vitest)
        run: npm test -- --run --passWithNoTests

      - name: Build
        run: npm run build

      - name: Upload build artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/.next
          retention-days: 3
          if-no-files-found: ignore

  # ---- Image: build, scan, push the web image to ACR --------------------
  image:
    name: build & scan web image
    needs: frontend
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-web:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          tags: ${{ env.IMAGE }}
          push: false
          load: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Generate SBOM (Syft)
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          artifact-name: sbom-web.spdx.json
          output-file: sbom-web.spdx.json
          upload-artifact: false

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-web.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

      - name: Upload SBOM artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: sbom-web
          path: sbom-web.spdx.json
          retention-days: 30

      - name: Push image to ACR
        run: docker push ${{ env.IMAGE }}

  # ---- Deploy: roll the web container ------------------------------------
  deploy-web:
    name: deploy web
    needs: image
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: ca-vrbook-web-staging
      resource_group: rg-vrbook-staging
      image: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-web:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---- Smoke: post-deploy curl sweep of the live web app ----------------
  smoke:
    name: smoke (web)
    needs: deploy-web
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover web FQDN
        id: fqdn
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show \
            -n ca-vrbook-web-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
          echo "Web FQDN: https://$FQDN"

      - name: Wait for active revision to match deployed image (max 3 min)
        env:
          EXPECTED_IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-web:${{ github.sha }}
        run: |
          set -euo pipefail
          for i in $(seq 1 36); do
            ACTIVE=$(az containerapp revision list \
              -n ca-vrbook-web-staging \
              -g ${{ env.RESOURCE_GROUP }} \
              --query "[?properties.active].{name:name, image:properties.template.containers[0].image, state:properties.runningState, health:properties.healthState}" \
              -o json)
            echo "[$i/36] active revisions: $ACTIVE"
            MATCH=$(echo "$ACTIVE" | jq -r --arg img "$EXPECTED_IMAGE" '.[] | select(.image==$img and .state=="Running" and .health=="Healthy") | .name' | head -1)
            if [ -n "$MATCH" ]; then
              echo "Active revision $MATCH is serving the expected image"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Active revision did not converge on $EXPECTED_IMAGE within 3 min"
          exit 1

      - name: Smoke routes
        env:
          WEB: https://${{ steps.fqdn.outputs.fqdn }}
        run: |
          set -euo pipefail

          assert() {
            local name=$1 expected=$2 actual=$3
            if [ "$actual" != "$expected" ]; then
              echo "::error::$name expected HTTP $expected, got $actual"
              exit 1
            fi
            echo "  $name -> $actual  OK"
          }

          curl_status() { curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$@"; }

          assert "GET /api/health"     200 "$(curl_status "$WEB/api/health")"
          assert "GET /"               200 "$(curl_status "$WEB/")"
          assert "GET /properties"     200 "$(curl_status "$WEB/properties")"
          assert "GET /account/bookings" 200 "$(curl_status "$WEB/account/bookings")"

          BODY=$(curl -sS --max-time 15 "$WEB/api/health")
          echo "  /api/health body: $BODY"
          echo "$BODY" | jq -e '.status == "ok"' > /dev/null \
            || { echo "::error::/api/health did not report ok"; exit 1; }
          echo "  /api/health shape  OK"

          echo ""
          echo "Smoke OK on $WEB"
