name: cd-staging

on:
  push:
    branches: [develop]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  gate:
    name: gate (verify CI green)
    runs-on: ubuntu-latest
    steps:
      - name: Smoke
        run: echo "hello from cd-staging on ${{ github.sha }}"
