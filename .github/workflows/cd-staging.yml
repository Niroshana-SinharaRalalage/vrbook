# =============================================================================
# cd-staging.yml — Deploy to STAGING on push to develop.
# Minimal version: gate, Bicep, migrator, deploy 4 .NET container apps.
# Smoke + promote + notify will be added back once the first deploy is healthy.
# =============================================================================
name: cd-staging

on:
  push:
    branches: [develop]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-staging
  cancel-in-progress: false

env:
  RESOURCE_GROUP: rg-vrbook-staging

jobs:
  # ---- Gate: require that ci.yml succeeded for this SHA ------------------
  gate:
    name: gate (verify CI green)
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI run was green for ${{ github.sha }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sleep 5  # give the CI workflow a moment to register
          CONCLUSION=$(gh api \
            "repos/${{ github.repository }}/actions/runs?branch=develop&head_sha=${{ github.sha }}&per_page=20" \
            --jq '.workflow_runs[] | select(.name=="ci") | .conclusion' | head -1)
          echo "ci conclusion for sha ${{ github.sha }}: ${CONCLUSION:-<none>}"
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::ci.yml did not complete successfully for this SHA. Push a fix to develop."
            exit 1
          fi

  # ---- Infra: Bicep what-if then deploy ----------------------------------
  infra:
    name: infra (Bicep)
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep what-if
        run: |
          az deployment group what-if \
            -g ${{ env.RESOURCE_GROUP }} \
            -f infra/main.bicep \
            -p infra/environments/staging.bicepparam

      - name: Bicep deploy
        run: |
          az deployment group create \
            -g ${{ env.RESOURCE_GROUP }} \
            -f infra/main.bicep \
            -p infra/environments/staging.bicepparam \
            --query "{provisioningState:properties.provisioningState, outputs:properties.outputs}" \
            -o json

  # ---- Migrate: run the Migrator Container App Job and wait --------------
  migrate:
    name: migrate (Postgres)
    needs: infra
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update migrator job image
        run: |
          az containerapp job update \
            -n migrator-vrbook-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/vrbook-migrator:${{ github.sha }}

      - name: Start migrator job + wait
        run: |
          set -euo pipefail
          EXEC=$(az containerapp job start \
            -n migrator-vrbook-staging \
            -g ${{ env.RESOURCE_GROUP }} \
            --query name -o tsv)
          echo "Started execution: $EXEC"
          for i in $(seq 1 30); do
            STATE=$(az containerapp job execution show \
              -n migrator-vrbook-staging \
              -g ${{ env.RESOURCE_GROUP }} \
              --job-execution-name "$EXEC" \
              --query status -o tsv)
            echo "[$i/30] migrator state: $STATE"
            case "$STATE" in
              Succeeded) exit 0 ;;
              Failed|Degraded) echo "::error::migrator failed"; exit 1 ;;
            esac
            sleep 10
          done
          echo "::error::migrator did not finish in 5 minutes"
          exit 1

  # ---- Deploy: workers in parallel, then API ------------------------------
  deploy-sync-worker:
    name: deploy sync-worker
    needs: migrate
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: sync-worker-vrbook-staging
      resource_group: rg-vrbook-staging
      image: ${{ secrets.ACR_NAME }}.azurecr.io/vrbook-sync-worker:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-notification-worker:
    name: deploy notification-worker
    needs: migrate
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: notification-worker-vrbook-staging
      resource_group: rg-vrbook-staging
      image: ${{ secrets.ACR_NAME }}.azurecr.io/vrbook-notification-worker:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-booking-worker:
    name: deploy booking-worker
    needs: migrate
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: booking-worker-vrbook-staging
      resource_group: rg-vrbook-staging
      image: ${{ secrets.ACR_NAME }}.azurecr.io/vrbook-booking-worker:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-api:
    name: deploy api
    needs: [deploy-sync-worker, deploy-notification-worker, deploy-booking-worker]
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: api-vrbook-staging
      resource_group: rg-vrbook-staging
      image: ${{ secrets.ACR_NAME }}.azurecr.io/vrbook-api:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ---- Smoke: just curl /health/ready -------------------------------------
  smoke:
    name: smoke (health probe)
    needs: deploy-api
    runs-on: ubuntu-latest
    steps:
      - name: Curl /health/ready
        run: |
          set -euo pipefail
          # Container Apps default FQDN is {app-name}.{environment-default-domain}.
          # Fetch the FQDN dynamically so we don't have to hard-code it.
          # (Requires az login — quick re-login via OIDC.)
          echo "Smoke test placeholder. Wire up after first successful deploy reveals FQDN."
