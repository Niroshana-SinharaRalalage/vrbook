name: cd-staging

on:
  push:
    branches: [develop]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  gate:
    name: gate (verify CI green)
    runs-on: ubuntu-latest
    steps:
      - name: Smoke
        run: echo "hello from cd-staging on ${{ github.sha }}"

  deploy-api:
    name: deploy api
    needs: gate
    uses: ./.github/workflows/_deploy-container-app.yml
    with:
      app_name: api-vrbook-staging
      resource_group: rg-vrbook-staging
      image: ${{ secrets.ACR_NAME }}.azurecr.io/vrbook-api:${{ github.sha }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
