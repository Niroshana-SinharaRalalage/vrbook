# =============================================================================
# ci-backend.yml — CI for the .NET backend + OpenAPI contract + 5 image builds.
# Path-filtered so frontend-only changes don't trigger this workflow.
# =============================================================================
name: ci-backend

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "contracts/**"
      - "**/*.csproj"
      - "**/Directory.Build.props"
      - "**/Directory.Build.targets"
      - "**/Directory.Packages.props"
      - "**/global.json"
      - "**/VrBook.sln"
      - ".github/workflows/ci-backend.yml"
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "contracts/**"
      - "**/*.csproj"
      - "**/Directory.Build.props"
      - "**/Directory.Build.targets"
      - "**/Directory.Packages.props"
      - "**/global.json"
      - "**/VrBook.sln"
      - ".github/workflows/ci-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.ref }}-ci-backend
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  SOLUTION: src/VrBook.sln
  OPENAPI_SPEC: contracts/openapi.yaml

jobs:
  # ---------------------------------------------------------------------------
  # backend — restore, lint, build, unit + integration tests.
  # ---------------------------------------------------------------------------
  backend:
    name: backend (.NET 8)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vrbook
          POSTGRES_PASSWORD: vrbook
          POSTGRES_DB: vrbook
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vrbook"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=vrbook;Username=vrbook;Password=vrbook"
      ConnectionStrings__Redis: "localhost:6379"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Lint (dotnet format)
        run: dotnet format ${{ env.SOLUTION }} --verify-no-changes --no-restore

      - name: Build (Release)
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release

      - name: Unit tests
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --no-build \
            --configuration Release \
            --filter "Category!=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=unit.trx"

      - name: Integration tests
        continue-on-error: true
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --no-build \
            --configuration Release \
            --filter "Category=Integration" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=integration.trx"

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./TestResults
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # contracts — OpenAPI diff vs. main + Spectral lint.
  # Lives in backend CI because the spec is owned and generated by the API.
  # ---------------------------------------------------------------------------
  contracts:
    name: contracts (OpenAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install oasdiff
        run: |
          OASDIFF_VERSION="1.10.25"
          curl -fsSL "https://github.com/Tufin/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oasdiff
          oasdiff --version

      - name: Fetch main copy of OpenAPI spec
        id: base_spec
        run: |
          mkdir -p .ci-tmp
          if git cat-file -e "origin/main:${OPENAPI_SPEC}" 2>/dev/null; then
            git show "origin/main:${OPENAPI_SPEC}" > .ci-tmp/openapi.main.yaml
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No baseline OpenAPI spec on main; skipping diff."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: OpenAPI breaking-change check
        if: steps.base_spec.outputs.exists == 'true' && hashFiles(env.OPENAPI_SPEC) != ''
        run: |
          oasdiff breaking \
            --fail-on ERR \
            --format githubactions \
            .ci-tmp/openapi.main.yaml ${{ env.OPENAPI_SPEC }}

      - name: OpenAPI changelog (informational)
        if: steps.base_spec.outputs.exists == 'true' && hashFiles(env.OPENAPI_SPEC) != ''
        continue-on-error: true
        run: |
          oasdiff changelog \
            --format githubactions \
            .ci-tmp/openapi.main.yaml ${{ env.OPENAPI_SPEC }}

      - name: Spectral lint OpenAPI
        if: hashFiles(env.OPENAPI_SPEC) != ''
        run: |
          npm install -g @stoplight/spectral-cli@6.13.1
          spectral lint --fail-severity=error ${{ env.OPENAPI_SPEC }}

  # ---------------------------------------------------------------------------
  # images — build, scan, push the 5 .NET images to ACR. Push only on
  # main/develop; PRs run the build+scan but skip the push step.
  # ---------------------------------------------------------------------------
  images:
    name: build & scan images
    needs: [backend, contracts]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: src/VrBook.Api/Dockerfile
            context: .
          - name: migrator
            dockerfile: src/VrBook.Migrator/Dockerfile
            context: .
          - name: sync-worker
            dockerfile: src/Workers/VrBook.Workers.Sync/Dockerfile
            context: .
          - name: notification-worker
            dockerfile: src/Workers/VrBook.Workers.Notifications/Dockerfile
            context: .
          - name: booking-worker
            dockerfile: src/Workers/VrBook.Workers.Booking/Dockerfile
            context: .
    env:
      IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/vrbook-${{ matrix.name }}:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ env.IMAGE }}
          push: false
          load: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Generate SBOM (Syft)
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.name }}.spdx.json
          output-file: sbom-${{ matrix.name }}.spdx.json
          upload-artifact: false

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Upload SBOM artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json
          retention-days: 30

      - name: Push image to ACR
        run: docker push ${{ env.IMAGE }}
