# =============================================================================
# Dependabot — keeps action versions, NuGet packages, npm deps, Bicep modules,
# and Docker base images current. Cadence:
#   - github-actions: daily (highest-risk supply chain surface)
#   - nuget / npm / bicep / docker: weekly (Monday morning UTC)
# =============================================================================
version: 2
updates:
  # ---- GitHub Actions ------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels: [dependencies, github-actions]
    commit-message:
      prefix: ci
      include: scope

  # ---- .NET (NuGet) --------------------------------------------------------
  # Central Package Management is enabled (Directory.Packages.props), so a
  # single update PR covers every project that consumes the same version.
  - package-ecosystem: nuget
    directory: /src
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels: [dependencies, backend]
    commit-message:
      prefix: deps(backend)
      include: scope
    groups:
      azure-sdk:
        patterns:
          - "Azure.*"
          - "Microsoft.Azure.*"
      aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.Extensions.*"
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore.*"
          - "Npgsql.EntityFrameworkCore.*"
      test-stack:
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "NSubstitute"
          - "Testcontainers*"
          - "Microsoft.NET.Test.Sdk"

  # ---- Next.js / TypeScript frontend ---------------------------------------
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels: [dependencies, frontend]
    commit-message:
      prefix: deps(web)
      include: scope
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      tanstack:
        patterns:
          - "@tanstack/*"
      tooling:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier"
          - "vitest"
          - "@vitejs/*"
          - "playwright"
          - "@playwright/*"

  # ---- Bicep modules -------------------------------------------------------
  # Dependabot ecosystem id for Bicep registry modules.
  - package-ecosystem: bicep
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels: [dependencies, infra]
    commit-message:
      prefix: deps(infra)
      include: scope

  # ---- Docker base images --------------------------------------------------
  # One entry per Dockerfile so Dependabot opens focused PRs.
  - package-ecosystem: docker
    directory: /src/VrBook.Api
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]
    commit-message:
      prefix: deps(docker)
      include: scope

  - package-ecosystem: docker
    directory: /src/VrBook.Migrator
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /src/Workers/VrBook.Workers.Sync
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /src/Workers/VrBook.Workers.Notifications
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /src/Workers/VrBook.Workers.Booking
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]
