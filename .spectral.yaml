# Spectral ruleset for VrBook's OpenAPI 3 spec.
# Inherits Stoplight's official OAS ruleset. Phase 1 / scaffold-era we only fail
# on errors (not warnings) — see ci.yml's `--fail-severity=error`.

extends: ["spectral:oas"]

# We don't override individual rules at this stage. The default spectral:oas set
# is reasonable; when contracts start firing real warnings worth blocking on,
# tighten by adding rule overrides here.
